[graph]
all-features = true

[advisories]
ignore = [
  # Transitive through reqwest; no maintained drop-in replacement is available yet.
  "RUSTSEC-2025-0134",
  # Transitive through parquet; crate archived upstream and no patched replacement in this dep chain yet.
  "RUSTSEC-2024-0436",
]

[licenses]
version = 2
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "MPL-2.0",
  "Zlib",
  "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
