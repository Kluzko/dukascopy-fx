name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - release/**

jobs:
  stable-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Unit tests
        run: cargo test --lib

      - name: Public API snapshot
        run: cargo test --test public_api_snapshot_test

      - name: Public API offline contract
        run: cargo test --test public_api_offline_test -- --test-threads=1

      - name: Binary tests
        run: cargo test --bin fx_fetcher

      - name: Doc tests
        run: cargo test --doc

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [beta, "1.76.0"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Remove lockfile for old Cargo compatibility
        if: matrix.toolchain == '1.76.0'
        run: rm -f Cargo.lock

      - name: Build check
        run: cargo check --all-targets --all-features

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Cargo audit
        run: cargo audit

      - name: Cargo deny
        run: cargo deny check
